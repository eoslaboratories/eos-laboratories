<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page Not Found — EOS Laboratories</title>
<meta name="robots" content="noindex, follow">
<meta name="theme-color" content="#F26B21">
<link rel="icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#2B2F36;--orange:#F26B21;--grey:#7F868D;--line:#E7E5E0;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',system-ui,sans-serif;background:#FAFAF8;color:var(--ink);min-height:100vh;display:flex;flex-direction:column;}
  a{text-decoration:none;color:inherit;}
  .serif{font-family:'Cormorant Garamond',Georgia,serif;}
  header{display:flex;align-items:center;gap:10px;padding:22px 28px;border-bottom:1px solid var(--line);}
  header .mark{width:34px;height:34px;border-radius:6px;background:url('/eos-logo-mrp8a4e9-r2uo.png') center/cover no-repeat;}
  header b{font-size:15px;font-weight:600;}
  main{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:48px 24px;}
  .wrap{max-width:620px;}
  .code{font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(90px,18vw,150px);font-weight:600;color:var(--orange);line-height:.9;}
  h1{font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(26px,4vw,38px);font-weight:600;margin-top:8px;}
  p{color:var(--grey);font-size:16px;line-height:1.7;margin:16px auto 0;max-width:460px;}
  .rule{width:40px;height:2px;background:var(--orange);margin:28px auto;}
  .btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:8px;}
  .btn{font-size:14px;font-weight:600;padding:14px 26px;border-radius:2px;border:1px solid var(--line);color:var(--ink);transition:all .2s;}
  .btn:hover{border-color:var(--orange);color:var(--orange);}
  .btn.primary{background:var(--orange);border-color:var(--orange);color:#fff;}
  .btn.primary:hover{background:#DA5E17;color:#fff;}
  footer{padding:20px 28px;border-top:1px solid var(--line);font-size:12.5px;color:var(--grey);text-align:center;}
</style>
</head>
<body>
<header><span class="mark"></span><b>EOS Laboratories</b></header>
<main>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you requested may have moved, been renamed, or is no longer available. Please return to the homepage or browse our product catalogue.</p>
    <div class="rule"></div>
    <div class="btns">
      <a class="btn primary" href="/index.dc.html">Return Home</a>
      <a class="btn" href="/products.dc.html">Browse Products</a>
      <a class="btn" href="/contact.dc.html">Contact Us</a>
    </div>
  </div>
</main>
<footer>© 2026 EOS Laboratories. Precision. Quality. Trust. · ISO 13485</footer>
</body>
</html>
